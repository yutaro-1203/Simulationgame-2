<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>発展シミュレーションULTIMATE</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

h1{ text-align:center; padding:10px; }

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:20px;
}

button,input{
    width:100%;
    margin-top:6px;
    padding:10px;
    border:none;
    border-radius:8px;
}

button{ background:#00c6ff; color:white; cursor:pointer; }

.locked{ display:none; }

/* 進行バー */
.bar{
    width:100%;
    height:20px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    width:0%;
    background:#00ffcc;
}
</style>
</head>

<body>

<h1>🌍 発展シミュレーションULTIMATE</h1>

<div class="container">

<!-- 資源 -->
<div class="card">
<h2>資源</h2>
木: <span id="wood">0</span><br>
石: <span id="stone">0</span><br>
板材: <span id="plank">0</span><br>
レンガ: <span id="brick">0</span><br>

<div id="ironArea" class="locked">
鉄鉱石: <span id="ironOre">0</span><br>
石炭: <span id="coal">0</span><br>
鉄: <span id="iron">0</span><br>
</div>

<div id="steelArea" class="locked">
鋼: <span id="steel">0</span><br>
</div>

💰: <span id="money">0</span><br>
XP: <span id="xp">0</span>
</div>

<!-- 採集 -->
<div class="card">
<h2>採集</h2>
<button onclick="clickWood()">木</button>
<button onclick="clickStone()">石</button>

<div id="mineBtns" class="locked">
<button onclick="clickIron()">鉄鉱石</button>
<button onclick="clickCoal()">石炭</button>
</div>
</div>

<!-- 加工 -->
<div class="card">
<h2>加工</h2>

<button onclick="process('plank')">板材(木3)</button>
<button onclick="process('brick')">レンガ(石3)</button>

<div id="ironBtn" class="locked">
<button onclick="process('iron')">鉄</button>
</div>

<div id="steelBtn" class="locked">
<button onclick="process('steel')">鋼</button>
</div>

<div class="bar">
<div id="barFill" class="fill"></div>
</div>

<div id="status">待機</div>

</div>

<!-- 売却 -->
<div class="card">
<h2>売却</h2>

<input id="sellWood" type="number" placeholder="木">
<button onclick="sell('wood')">木 (×2)</button>

<input id="sellPlank" type="number" placeholder="板材">
<button onclick="sell('plank')">板材 (×5)</button>

<input id="sellSteel" type="number" placeholder="鋼">
<button onclick="sell('steel')">鋼 (×30)</button>

</div>

<!-- 解放 -->
<div class="card">
<h2>解放</h2>

<button onclick="unlockMine()">鉱山解放 (板材10)</button>
<button onclick="unlockSteel()">製鋼解放 (鉄10)</button>

</div>

<!-- 強化 -->
<div class="card">
<h2>強化</h2>
<button onclick="upgradeTool()">採集強化</button>
<button onclick="upgradeFactory()">加工強化</button>
</div>

</div>

<script>

let d = {
wood:0, stone:0, plank:0, brick:0,
ironOre:0, coal:0, iron:0, steel:0,
money:0, xp:0,
toolLv:1, factoryLv:1,
unlockedMine:false,
unlockedSteel:false,
processing:false
};

// ===== 採集 =====
function clickWood(){ d.wood++; gainXP(1); update(); }
function clickStone(){ d.stone++; gainXP(1); update(); }
function clickIron(){ if(d.unlockedMine){ d.ironOre++; gainXP(2); update(); }}
function clickCoal(){ if(d.unlockedMine){ d.coal++; gainXP(2); update(); }}

// ===== XP =====
function gainXP(x){ d.xp+=x; }

// ===== 加工（バー付き） =====
function process(type){
    if(d.processing) return;

    d.processing=true;
    let time = 3000 / d.factoryLv;
    let start = Date.now();

    let bar = document.getElementById("barFill");
    document.getElementById("status").textContent="加工中";

    let interval = setInterval(()=>{
        let progress = (Date.now()-start)/time*100;
        bar.style.width = progress+"%";
    },50);

    setTimeout(()=>{

        clearInterval(interval);
        bar.style.width="0%";

        if(type==="plank" && d.wood>=3){ d.wood-=3; d.plank++; }
        if(type==="brick" && d.stone>=3){ d.stone-=3; d.brick++; }
        if(type==="iron" && d.ironOre>=2 && d.coal>=1){
            d.ironOre-=2; d.coal-=1; d.iron++;
        }
        if(type==="steel" && d.iron>=2 && d.coal>=2){
            d.iron-=2; d.coal-=2; d.steel++;
        }

        d.processing=false;
        document.getElementById("status").textContent="完了";
        update();

    }, time);
}

// ===== 売却 =====
function sell(type){
    let num=parseInt(document.getElementById("sell"+type.charAt(0).toUpperCase()+type.slice(1)).value);
    if(!num) return;

    if(type==="wood" && d.wood>=num){ d.wood-=num; d.money+=num*2; }
    if(type==="plank" && d.plank>=num){ d.plank-=num; d.money+=num*5; }
    if(type==="steel" && d.steel>=num){ d.steel-=num; d.money+=num*30; }

    update();
}

// ===== 解放 =====
function unlockMine(){
    if(d.plank>=10){
        d.plank-=10;
        d.unlockedMine=true;
    }
}

function unlockSteel(){
    if(d.iron>=10){
        d.iron-=10;
        d.unlockedSteel=true;
    }
}

// ===== 強化 =====
function upgradeTool(){
    if(d.money>=50 && d.plank>=5){
        d.money-=50; d.plank-=5;
        d.toolLv++;
    }
}

function upgradeFactory(){
    if(d.money>=100 && d.brick>=5 && d.iron>=3){
        d.money-=100; d.brick-=5; d.iron-=3;
        d.factoryLv++;
    }
}

// ===== 表示 =====
function update(){

    for(let k in d){
        if(document.getElementById(k)){
            document.getElementById(k).textContent=d[k];
        }
    }

    if(d.unlockedMine){
        document.getElementById("ironArea").classList.remove("locked");
        document.getElementById("mineBtns").classList.remove("locked");
        document.getElementById("ironBtn").classList.remove("locked");
    }

    if(d.unlockedSteel){
        document.getElementById("steelArea").classList.remove("locked");
        document.getElementById("steelBtn").classList.remove("locked");
    }
}

update();

</script>

</body>
</html>

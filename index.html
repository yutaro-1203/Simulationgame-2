<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>発展シミュレーションPRO MAX</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

h1{ text-align:center; padding:10px; }

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    padding:20px;
}

button{
    width:100%;
    margin-top:6px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
}

.stat{ margin:5px 0; font-size:14px; }
.locked{ display:none; }
</style>
</head>

<body>

<h1>🌍 発展シミュレーションPRO MAX</h1>

<div class="container">

<div class="card">
<h2>資源</h2>
木: <span id="wood">0</span><br>
石: <span id="stone">0</span><br>
板材: <span id="plank">0</span><br>
レンガ: <span id="brick">0</span><br>
鉄鉱石: <span id="ironOre">0</span><br>
石炭: <span id="coal">0</span><br>
鉄: <span id="iron">0</span><br>
鋼: <span id="steel">0</span><br>
💰: <span id="money">0</span><br>
XP: <span id="xp">0</span>
</div>

<div class="card">
<h2>採集</h2>
<button onclick="clickWood()">木</button>
<button onclick="clickStone()">石</button>
<button onclick="clickIron()">鉄鉱石</button>
<button onclick="clickCoal()">石炭</button>
</div>

<div class="card">
<h2>加工（時間あり）</h2>

<button onclick="process('plank')">板材(木3)</button>
<button onclick="process('brick')">レンガ(石3)</button>

<button onclick="process('iron')">鉄(鉱石2+石炭1)</button>
<button onclick="process('steel')">鋼(鉄2+石炭2)</button>

状態: <span id="proc">待機</span>
</div>

<div class="card">
<h2>自動加工</h2>

<button onclick="toggleAuto('iron')">製鉄 ON/OFF</button>
<button onclick="toggleAuto('steel')">製鋼 ON/OFF</button>

</div>

<div class="card">
<h2>強化</h2>
<button onclick="upgradeTool()">採集強化</button>
<button onclick="upgradeFactory()">加工強化</button>
</div>

<div class="card">
<h2>XPスキル</h2>
<button onclick="useXP()">採集効率UP (XP10)</button>
</div>

</div>

<script>

let d = {
wood:0, stone:0, plank:0, brick:0,
ironOre:0, coal:0, iron:0, steel:0,
money:0, xp:0,
toolLv:1, factoryLv:1,
eff:0,
autoIron:false,
autoSteel:false,
processing:false
};

// ===== 採集 =====
function clickWood(){ d.wood+=1+d.eff; gainXP(1); update(); }
function clickStone(){ d.stone+=1+d.eff; gainXP(1); update(); }
function clickIron(){ d.ironOre+=1+d.eff; gainXP(2); update(); }
function clickCoal(){ d.coal+=1+d.eff; gainXP(2); update(); }

// ===== XP =====
function gainXP(x){ d.xp+=x; }

// ===== 加工 =====
function process(type){
    if(d.processing) return;

    let time = 3000 / d.factoryLv;
    d.processing=true;
    document.getElementById("proc").textContent="加工中";

    setTimeout(()=>{

        if(type==="plank" && d.wood>=3){
            d.wood-=3; d.plank++;
        }
        if(type==="brick" && d.stone>=3){
            d.stone-=3; d.brick++;
        }
        if(type==="iron" && d.ironOre>=2 && d.coal>=1){
            d.ironOre-=2; d.coal-=1; d.iron++;
        }
        if(type==="steel" && d.iron>=2 && d.coal>=2){
            d.iron-=2; d.coal-=2; d.steel++;
        }

        d.processing=false;
        document.getElementById("proc").textContent="完了";
        update();

    }, time);
}

// ===== 自動 =====
function toggleAuto(type){
    if(type==="iron") d.autoIron=!d.autoIron;
    if(type==="steel") d.autoSteel=!d.autoSteel;
}

// 自動ループ
setInterval(()=>{
    if(d.autoIron && d.ironOre>=2 && d.coal>=1){
        d.ironOre-=2; d.coal-=1; d.iron++;
    }
    if(d.autoSteel && d.iron>=2 && d.coal>=2){
        d.iron-=2; d.coal-=2; d.steel++;
    }
    update();
},2000);

// ===== 強化 =====
function upgradeTool(){
    if(d.money>=50 && d.plank>=5){
        d.money-=50; d.plank-=5;
        d.toolLv++;
    }
}

function upgradeFactory(){
    if(d.money>=100 && d.brick>=5 && d.iron>=3){
        d.money-=100; d.brick-=5; d.iron-=3;
        d.factoryLv++;
    }
}

// ===== XP使用 =====
function useXP(){
    if(d.xp>=10){
        d.xp-=10;
        d.eff++;
    }
}

// ===== 更新 =====
function update(){
    for(let k in d){
        if(document.getElementById(k)){
            document.getElementById(k).textContent=d[k];
        }
    }
}

update();

</script>

</body>
</html>
